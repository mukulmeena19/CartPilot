version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    container_name: cartpilot-db-prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cartpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cartpilot_password}
      POSTGRES_DB: ${POSTGRES_DB:-cartpilot_db}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cartpilot} -d ${POSTGRES_DB:-cartpilot_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: cartpilot-backend-prod
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cartpilot}:${POSTGRES_PASSWORD:-cartpilot_password}@db:5432/${POSTGRES_DB:-cartpilot_db}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: cartpilot-frontend-prod
    restart: always
    ports:
      - "3000:3000"
    environment:
      # In production, the API URL should point to the public domain or relative path if proxied
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  postgres_data_prod:
