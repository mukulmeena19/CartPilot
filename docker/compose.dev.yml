version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    container_name: cartpilot-db-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cartpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cartpilot_password}
      POSTGRES_DB: ${POSTGRES_DB:-cartpilot_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cartpilot} -d ${POSTGRES_DB:-cartpilot_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: cartpilot-backend-dev
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cartpilot}:${POSTGRES_PASSWORD:-cartpilot_password}@db:5432/${POSTGRES_DB:-cartpilot_db}
      - LLM_PROVIDER=${LLM_PROVIDER:-mock}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-debug}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: cartpilot-frontend-dev
    # In dev, we can override command to run dev server
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data_dev:
