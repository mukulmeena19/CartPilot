version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    container_name: cartpilot-db
    environment:
      POSTGRES_USER: cartpilot
      POSTGRES_PASSWORD: cartpilot_password
      POSTGRES_DB: cartpilot_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
