name: Backend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: backend

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        
    - name: Install uv
      uses: astral-sh/setup-uv@v2
      with:
        version: "latest"
        
    - name: Install dependencies
      run: uv sync --dev

    - name: Run Ruff Linter & Formatter
      run: uv run ruff check .
      
    - name: Run Mypy Type Checking
      run: uv run mypy . --ignore-missing-imports
      
    - name: Run Pytest
      run: uv run pytest
      env:
        LLM_PROVIDER: mock
        PYTHONPATH: .

    - name: Validate Alembic Migrations
      # We just check if they compile correctly since we don't have a live DB running
      run: uv run alembic history
